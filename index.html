<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Распознавание мусора v2.9</title>
  <style>
    :root {
      --bg: #0a0a0f; --text: #e8e8f0; --text-muted: #6b7280;
      --card-bg: rgba(255,255,255,0.03); --card-border: rgba(255,255,255,0.08);
      --accent: #818cf8; --accent-bg: rgba(129,140,248,0.12);
      --accent-border: rgba(129,140,248,0.35);
      --success: #22c55e; --success-bg: rgba(34,197,94,0.12); --success-border: rgba(34,197,94,0.35);
      --danger: #ef4444; --danger-bg: rgba(239,68,68,0.12); --danger-border: rgba(239,68,68,0.35);
    }
    [data-theme="light"] {
      --bg: #f8fafc; --text: #0f172a; --text-muted: #64748b;
      --card-bg: #ffffff; --card-border: #e2e8f0;
      --accent: #4f46e5; --accent-bg: rgba(79,70,229,0.08); --accent-border: rgba(79,70,229,0.25);
      --success: #16a34a; --success-bg: rgba(22,163,74,0.08); --success-border: rgba(22,163,74,0.25);
      --danger: #dc2626; --danger-bg: rgba(220,38,38,0.08); --danger-border: rgba(220,38,38,0.25);
    }
    * { box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
    .container { max-width: 760px; margin: 0 auto; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
    h1 { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--text), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; }
    .free-badge { display: inline-block; font-size: 10px; font-weight: 700; background: var(--success); color: #fff; padding: 3px 8px; border-radius: 10px; margin-left: 8px; vertical-align: middle; -webkit-text-fill-color: #fff; }
    .theme-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid var(--card-border); background: var(--card-bg); color: var(--text); cursor: pointer; font-weight: 500; font-size: 14px; }
    .model-status { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 10px; font-size: 13px; }
    .model-label { color: var(--text-muted); font-weight: 500; }
    .model-name { color: var(--accent); font-weight: 600; font-family: monospace; font-size: 12px; }
    .model-badge { background: var(--success-bg); color: var(--success); padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 600; }
    .preferred-info { font-size: 11px; color: var(--text-muted); margin-bottom: 16px; padding: 8px 12px; background: var(--card-bg); border-radius: 8px; border: 1px solid var(--card-border); }
    .video-container { position: relative; background: #111; border-radius: 16px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--card-border); }
    video, canvas { width: 100%; display: block; max-height: 420px; object-fit: contain; }
    .camera-overlay { position: absolute; left: 0; right: 0; bottom: 0; padding: 12px 14px; background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.75) 40%, rgba(0,0,0,0.9) 100%); display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; }
    
    /* Единый стиль кнопок */
    .btn {
      padding: 10px 18px;
      border-radius: 10px;
      border: 1px solid var(--card-border);
      background: rgba(255,255,255,0.06);
      color: var(--text);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      display: inline-flex;      align-items: center;
      gap: 6px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn:hover:not(:disabled) {
      background: rgba(255,255,255,0.12);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; filter: grayscale(0.3); }
    .btn.hidden { display: none !important; }
    
    /* Варианты кнопок — только цвет фона/рамки, размер тот же */
    .btn-accent {
      background: var(--accent-bg);
      border-color: var(--accent-border);
      color: var(--accent);
    }
    .btn-accent:hover:not(:disabled) { background: rgba(129,140,248,0.2); }
    
    .btn-success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success);
    }
    .btn-success:hover:not(:disabled) { background: rgba(34,197,94,0.2); }
    
    .btn-danger {
      background: var(--danger-bg);
      border-color: var(--danger-border);
      color: var(--danger);
    }
    .btn-danger:hover:not(:disabled) { background: rgba(239,68,68,0.2); }
    
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 24px; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 12px; padding: 16px; text-align: center; }
    .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 4px; }
    
    .results-section { margin-bottom: 24px; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
    .results-header h3 { font-size: 16px; margin: 0; color: var(--text-muted); }
    .selection-info { font-size: 13px; color: var(--accent); font-weight: 600; }
    .bulk-actions { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    
    .item-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; margin-bottom: 12px; transition: border-color 0.2s; }
    .item-card.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-bg); }
    .item-card-header { padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; border-bottom: 1px solid var(--card-border); }
    .item-checkbox { width: 20px; height: 20px; margin-top: 2px; cursor: pointer; accent-color: var(--accent); flex-shrink: 0; }    .item-title { flex: 1; font-weight: 600; font-size: 15px; color: var(--text); }
    .item-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .item-confidence { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 12px; flex-shrink: 0; }
    
    .item-desc { padding: 12px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.5; border-bottom: 1px solid var(--card-border); }
    .item-fields { padding: 8px 0; }
    .item-field { display: flex; padding: 8px 16px; font-size: 13px; border-bottom: 1px solid var(--card-border); }
    .item-field:last-child { border-bottom: none; }
    .item-field-label { min-width: 120px; color: var(--text-muted); font-weight: 500; }
    .item-field-value { color: var(--text); flex: 1; }
    .item-actions { padding: 12px 16px; background: rgba(99,102,241,0.03); display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
    
    .history { margin-top: 20px; }
    .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .history h3 { font-size: 16px; margin: 0; color: var(--text-muted); }
    .history-list { list-style: none; padding: 0; }
    .history-item { border: 1px solid var(--card-border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; background: var(--card-bg); }
    .history-item-header { padding: 12px 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.15s; }
    .history-item-header:hover { background: var(--accent-bg); }
    .history-item-title { font-weight: 600; font-size: 14px; color: var(--text); }
    .history-item-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .history-item-arrow { font-size: 12px; color: var(--text-muted); transition: transform 0.2s; }
    .history-item-arrow.open { transform: rotate(180deg); }
    .history-item-details { padding: 0 16px 12px; display: none; border-top: 1px solid var(--card-border); }
    .history-item-details.open { display: block; padding-top: 12px; }
    .detail-row { display: flex; padding: 6px 0; font-size: 13px; border-bottom: 1px solid var(--card-border); }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { min-width: 120px; color: var(--text-muted); font-weight: 500; }
    .detail-value { color: var(--text); flex: 1; }
    .weight-calc { background: var(--success-bg); border: 1px solid var(--success-border); border-radius: 8px; padding: 8px 12px; margin-top: 8px; font-size: 12px; color: var(--success); }
    .err { background: var(--danger-bg); border: 1px solid var(--danger-border); border-radius: 12px; padding: 12px 16px; color: var(--danger); font-size: 14px; margin-bottom: 16px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .loading-overlay {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 10; border-radius: 16px;
    }
    .loading-overlay.active { display: flex; }
    .loading-overlay .spinner-large {
      width: 48px; height: 48px;
      border: 4px solid rgba(129,140,248,0.2); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 16px;
    }
    .loading-overlay .loading-text { color: #fff; font-size: 16px; font-weight: 600; }
    .loading-overlay .loading-subtext { color: var(--text-muted); font-size: 13px; margin-top: 8px; }
  </style>
</head><body>
  <div class="container">
    <div class="header">
      <h1>Распознавание v2.9<span class="free-badge">FREE</span></h1>
      <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">Темная тема</button>
    </div>

    <div class="model-status">
      <span class="model-label">Модель:</span>
      <span class="model-name" id="currentModel">nex-agi/nex-n2-pro:free</span>
      <button class="btn hidden" onclick="switchToNextModel()" id="btnSwitch">Сменить модель</button>
      <span class="model-badge" id="preferredBadge" style="display:none"><span id="preferredCount">0</span> в приоритете</span>
    </div>

    <div class="preferred-info" id="preferredInfo" style="display:none">
      Ускорение: <span id="preferredInfoCount">0</span> моделей в приоритете
    </div>

    <div class="err" id="err" style="display:none"></div>

    <div class="video-container">
      <video id="vid" autoplay playsinline muted></video>
      <canvas id="can" style="display:none"></canvas>
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner-large"></div>
        <div class="loading-text">Изображение захвачено</div>
        <div class="loading-subtext" id="loadingSubtext">Анализ через AI...</div>
      </div>
      <div class="camera-overlay" id="cameraOverlay">
        <button class="btn" onclick="toggleCamera()" id="btnCamera">Включить камеру</button>
        <button class="btn btn-success hidden" onclick="handleAction()" id="btnAction">Распознать</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card"><div class="stat-value" id="sTotal">0</div><div class="stat-label">Всего</div></div>
      <div class="stat-card"><div class="stat-value" id="sRec">0</div><div class="stat-label">Переработано</div></div>
      <div class="stat-card"><div class="stat-value" id="sW">0 г</div><div class="stat-label">Вес пустой тары</div></div>
    </div>

    <div class="results-section" id="resultsSection" style="display:none">
      <div class="results-header">
        <h3>Распознанные предметы (<span id="resultsCount">0</span>)</h3>
        <span class="selection-info" id="selectionInfo">Выбрано: 0</span>
      </div>
      <div class="bulk-actions">
        <button class="btn btn-success" onclick="saveSelected()" id="btnSaveSelected" disabled>Сохранить выбранные</button>
        <button class="btn" onclick="selectAll()">Выбрать все</button>
        <button class="btn" onclick="deselectAll()">Снять все</button>
        <button class="btn btn-danger" onclick="cancelResults()">Отменить</button>      </div>
      <div id="resultsList"></div>
    </div>

    <div class="history">
      <div class="history-header">
        <h3>История операций (<span id="historyCount">0</span>)</h3>
        <button class="btn btn-danger" onclick="clearHistory()" id="btnClear" disabled>Очистить</button>
      </div>
      <ul class="history-list" id="historyList"></ul>
    </div>
  </div>

  <script>
    let stream, stats = { total: 0, rec: 0, w: 0 };
    let history = [];
    let preferredModels = [];
    let currentModel = "nex-agi/nex-n2-pro:free";
    let expandedId = null;
    let actionState = 'recognize';
    let recognizedItems = [];
    let selectedIds = new Set();
    let isDark = false;

    const EMPTY_WEIGHTS = {
      plastic_bottle_033: 12, plastic_bottle_05: 18, plastic_bottle_1: 28, plastic_bottle_15: 38, plastic_bottle_2: 48,
      plastic_cup: 8, plastic_container: 15, plastic_bag: 4,
      glass_bottle_033: 180, glass_bottle_05: 250, glass_bottle_07: 350, glass_bottle_1: 450, glass_jar: 200,
      aluminum_can_033: 13, aluminum_can_05: 18,
      metal_can_small: 40, metal_can_medium: 60, metal_can_large: 80,
      paper_bag_small: 8, paper_bag_medium: 15, paper_bag_large: 25,
      cardboard_box_small: 20, cardboard_box_medium: 40, cardboard_box_large: 70, cardboard_box_xlarge: 120,
      paper_cup: 10, paper_container: 12,
      metal_knife: 60, metal_fork: 40, metal_spoon: 30,
      ceramic_plate: 350, ceramic_cup: 200, glass_cup: 220,
      default_small: 30, default_medium: 60, default_large: 120, default_xlarge: 250
    };

    const MATERIAL_LABELS = { plastic: "Пластик", glass: "Стекло", aluminum: "Алюминий", paper: "Бумага", cardboard: "Картон", metal: "Металл", ceramic: "Керамика", other: "Другое" };
    const SIZE_LABELS = { small: "Маленький", medium: "Средний", large: "Большой", xlarge: "Очень большой" };

    function getEmptyWeight(material, category, size, productName) {
      const mat = (material || '').toLowerCase();
      const cat = (category || '').toLowerCase();
      const name = (productName || '').toLowerCase();
      const sz = size || 'medium';

      if (mat === 'plastic' && (cat.includes('бутылк') || cat.includes('bottle') || name.includes('бутылк'))) {
        if (sz === 'small') return EMPTY_WEIGHTS.plastic_bottle_05;
        if (sz === 'large') return EMPTY_WEIGHTS.plastic_bottle_2;        return EMPTY_WEIGHTS.plastic_bottle_1;
      }
      if (mat === 'plastic' && (cat.includes('стакан') || cat.includes('cup') || cat.includes('контейнер'))) {
        return cat.includes('контейнер') ? EMPTY_WEIGHTS.plastic_container : EMPTY_WEIGHTS.plastic_cup;
      }
      if (mat === 'plastic' && (cat.includes('пакет') || cat.includes('bag') || cat.includes('плёнк'))) return 5;
      if (mat === 'glass' && (cat.includes('бутылк') || cat.includes('bottle'))) {
        if (sz === 'small') return EMPTY_WEIGHTS.glass_bottle_033;
        if (sz === 'large') return EMPTY_WEIGHTS.glass_bottle_1;
        return EMPTY_WEIGHTS.glass_bottle_07;
      }
      if (mat === 'glass' && (cat.includes('банк') || cat.includes('jar') || cat.includes('банка'))) return EMPTY_WEIGHTS.glass_jar;
      if (mat === 'glass' && (cat.includes('стакан') || cat.includes('чашк') || cat.includes('cup'))) return EMPTY_WEIGHTS.glass_cup;
      if (mat === 'aluminum' && (cat.includes('банк') || cat.includes('can'))) {
        return sz === 'small' ? EMPTY_WEIGHTS.aluminum_can_033 : EMPTY_WEIGHTS.aluminum_can_05;
      }
      if (mat === 'metal' && (cat.includes('банк') || cat.includes('консерв') || cat.includes('can'))) {
        if (sz === 'small') return EMPTY_WEIGHTS.metal_can_small;
        if (sz === 'large') return EMPTY_WEIGHTS.metal_can_large;
        return EMPTY_WEIGHTS.metal_can_medium;
      }
      if (mat === 'metal' && (cat.includes('нож') || cat.includes('knife') || name.includes('нож'))) return EMPTY_WEIGHTS.metal_knife;
      if (mat === 'metal' && (cat.includes('вилк') || cat.includes('fork') || name.includes('вилк'))) return EMPTY_WEIGHTS.metal_fork;
      if (mat === 'metal' && (cat.includes('ложк') || cat.includes('spoon') || name.includes('ложк'))) return EMPTY_WEIGHTS.metal_spoon;
      if (mat === 'cardboard' && (cat.includes('коробк') || cat.includes('box') || cat.includes('упаковк'))) {
        if (sz === 'small') return EMPTY_WEIGHTS.cardboard_box_small;
        if (sz === 'large') return EMPTY_WEIGHTS.cardboard_box_large;
        if (sz === 'xlarge') return EMPTY_WEIGHTS.cardboard_box_xlarge;
        return EMPTY_WEIGHTS.cardboard_box_medium;
      }
      if ((mat === 'paper' || mat === 'cardboard') && (cat.includes('пакет') || cat.includes('bag'))) {
        if (sz === 'small') return EMPTY_WEIGHTS.paper_bag_small;
        if (sz === 'large') return EMPTY_WEIGHTS.paper_bag_large;
        return EMPTY_WEIGHTS.paper_bag_medium;
      }
      if (mat === 'paper' && (cat.includes('стакан') || cat.includes('cup'))) return EMPTY_WEIGHTS.paper_cup;
      if (mat === 'paper' && (cat.includes('контейнер') || cat.includes('упаковк'))) return EMPTY_WEIGHTS.paper_container;
      if (mat === 'ceramic' && (cat.includes('тарелк') || cat.includes('plate'))) return EMPTY_WEIGHTS.ceramic_plate;
      if (mat === 'ceramic' && (cat.includes('чашк') || cat.includes('cup'))) return EMPTY_WEIGHTS.ceramic_cup;
      return EMPTY_WEIGHTS[`default_${sz}`] || EMPTY_WEIGHTS.default_medium;
    }

    function toggleTheme() {
      const html = document.documentElement;
      isDark = html.getAttribute('data-theme') === 'dark';
      html.setAttribute('data-theme', isDark ? 'light' : 'dark');
      document.getElementById('themeBtn').textContent = isDark ? 'Темная тема' : 'Светлая тема';
    }

    function showLoadingOverlay(subtext) {      document.getElementById('loadingSubtext').textContent = subtext || 'Анализ через AI...';
      document.getElementById('loadingOverlay').classList.add('active');
    }

    function hideLoadingOverlay() {
      document.getElementById('loadingOverlay').classList.remove('active');
    }

    function loadFromStorage() {
      try {
        const savedModels = localStorage.getItem("recognizer_preferred_models");
        if (savedModels) { preferredModels = JSON.parse(savedModels); updatePreferredUI(); }
        const savedHistory = localStorage.getItem("recognizer_history");
        if (savedHistory) { history = JSON.parse(savedHistory); renderHistory(); }
        const savedStats = localStorage.getItem("recognizer_stats");
        if (savedStats) { stats = JSON.parse(savedStats); updateStats(); }
      } catch (e) { console.error("Ошибка загрузки из localStorage:", e); }
    }

    function updatePreferredUI() {
      if (preferredModels.length > 0) {
        document.getElementById('preferredBadge').style.display = 'inline';
        document.getElementById('preferredCount').textContent = preferredModels.length;
        document.getElementById('preferredInfo').style.display = 'block';
        document.getElementById('preferredInfoCount').textContent = preferredModels.length;
      }
    }

    function updateStats() {
      document.getElementById('sTotal').textContent = stats.total;
      document.getElementById('sRec').textContent = stats.rec;
      document.getElementById('sW').textContent = stats.w + ' г';
    }

    function setCameraButtonsState(isCameraOn) {
      const btnAction = document.getElementById('btnAction');
      const btnSwitch = document.getElementById('btnSwitch');
      if (isCameraOn) {
        btnAction.classList.remove('hidden');
        btnSwitch.classList.remove('hidden');
      } else {
        btnAction.classList.add('hidden');
        btnSwitch.classList.add('hidden');
      }
    }

    async function toggleCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;        document.getElementById('vid').srcObject = null;
        const btnCamera = document.getElementById('btnCamera');
        btnCamera.textContent = 'Включить камеру';
        btnCamera.className = 'btn';
        setCameraButtonsState(false);
        cancelResults();
      } else {
        try {
          stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
          document.getElementById('vid').srcObject = stream;
          const btnCamera = document.getElementById('btnCamera');
          btnCamera.textContent = 'Выключить камеру';
          btnCamera.className = 'btn btn-danger';
          setCameraButtonsState(true);
          document.getElementById('err').style.display = 'none';
        } catch (e) { showError("Ошибка камеры: " + e.message); }
      }
    }

    async function handleAction() {
      if (actionState === 'recognize') await doRecognize();
    }

    async function doRecognize(specificModel) {
      const vid = document.getElementById('vid');
      const can = document.getElementById('can');
      const maxDim = 1024;
      const scale = Math.min(maxDim / vid.videoWidth, maxDim / vid.videoHeight, 1);
      can.width = vid.videoWidth * scale;
      can.height = vid.videoHeight * scale;
      can.getContext('2d').drawImage(vid, 0, 0, can.width, can.height);
      const img = can.toDataURL('image/jpeg', 0.6).split(',')[1];

      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
        document.getElementById('vid').srcObject = null;
        const btnCamera = document.getElementById('btnCamera');
        btnCamera.textContent = 'Включить камеру';
        btnCamera.className = 'btn';
        setCameraButtonsState(false);
      }

      actionState = 'analyzing';
      showLoadingOverlay('Анализ через AI...');
      document.getElementById('resultsSection').style.display = 'none';
      document.getElementById('err').style.display = 'none';

      try {
        const res = await fetch('/api/recognize', {          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: img, mediaType: 'image/jpeg', preferredModels: preferredModels, useSpecificModel: specificModel })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка сервера');
        
        currentModel = data._used_model || currentModel;
        document.getElementById('currentModel').textContent = currentModel;
        if (data._used_model && !preferredModels.includes(data._used_model)) {
          preferredModels = [data._used_model, ...preferredModels].slice(0, 5);
          localStorage.setItem("recognizer_preferred_models", JSON.stringify(preferredModels));
          updatePreferredUI();
        }

        let items = [];
        if (data.items && Array.isArray(data.items)) {
          items = data.items;
        } else if (data.product_name) {
          items = [data];
        }
        
        recognizedItems = items.map((item, idx) => ({
          ...item,
          _id: Date.now() + idx,
          _empty_weight: getEmptyWeight(item.material_type, item.category, item.size, item.product_name),
          _confidence: item.confidence || data.confidence || 'medium'
        }));

        selectedIds = new Set(recognizedItems.map(it => it._id));
        renderResults();
        actionState = 'results';

        setTimeout(() => {
          document.getElementById('resultsSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);

      } catch (e) {
        showError(e.message);
        actionState = 'recognize';
      } finally {
        hideLoadingOverlay();
      }
    }

    function renderResults() {
      const section = document.getElementById('resultsSection');
      const list = document.getElementById('resultsList');
      const countEl = document.getElementById('resultsCount');
      const infoEl = document.getElementById('selectionInfo');      const saveBtn = document.getElementById('btnSaveSelected');

      if (recognizedItems.length === 0) {
        section.style.display = 'none';
        return;
      }

      section.style.display = 'block';
      countEl.textContent = recognizedItems.length;
      infoEl.textContent = `Выбрано: ${selectedIds.size} из ${recognizedItems.length}`;
      saveBtn.disabled = selectedIds.size === 0;

      list.innerHTML = recognizedItems.map(item => {
        const isSelected = selectedIds.has(item._id);
        const colors = { high: '#22c55e', medium: '#f59e0b', low: '#ef4444' };
        const labels = { high: 'Высокая', medium: 'Средняя', low: 'Низкая' };
        const confColor = colors[item._confidence] || colors.medium;
        const confLabel = labels[item._confidence] || labels.medium;

        const fields = [
          ['Производитель', item.manufacturer],
          ['Бренд', item.brand],
          ['Страна', item.country],
          ['Категория', item.category],
          ['Материал', MATERIAL_LABELS[item.material_type || 'other']],
          ['Размер', SIZE_LABELS[item.size || 'medium']],
          ['Вес пустой тары', `${item._empty_weight} г`],
          ['Указанный вес', item.weight || '—'],
          ['Переработка', item.recyclable ? 'Да' : 'Нет'],
          ['Штрихкод', item.barcode || '—'],
          ['Состав', item.ingredients || '—']
        ];

        return `
          <div class="item-card ${isSelected ? 'selected' : ''}" data-id="${item._id}">
            <div class="item-card-header">
              <input type="checkbox" class="item-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleItem(${item._id})">
              <div style="flex:1">
                <div class="item-title">${item.product_name || 'Неизвестный предмет'}</div>
                <div class="item-subtitle">${item.brand || 'No brand'} · ${MATERIAL_LABELS[item.material_type || 'other']} · ${item._empty_weight} г</div>
              </div>
              <span class="item-confidence" style="background:${confColor}18;color:${confColor};border:1px solid ${confColor}40">
                ${confLabel}
              </span>
            </div>
            ${item.description ? `<div class="item-desc">${item.description}</div>` : ''}
            <div class="item-fields">
              ${fields.filter(([l, v]) => v).map(([l, v]) => `<div class="item-field"><span class="item-field-label">${l}</span><span class="item-field-value">${v}</span></div>`).join('')}
            </div>
            <div class="item-actions">              <button class="btn btn-success" onclick="saveSingle(${item._id})">Сохранить</button>
              <button class="btn btn-danger" onclick="removeItem(${item._id})">Убрать</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function toggleItem(id) {
      if (selectedIds.has(id)) selectedIds.delete(id);
      else selectedIds.add(id);
      renderResults();
    }

    function selectAll() {
      recognizedItems.forEach(it => selectedIds.add(it._id));
      renderResults();
    }

    function deselectAll() {
      selectedIds.clear();
      renderResults();
    }

    function removeItem(id) {
      recognizedItems = recognizedItems.filter(it => it._id !== id);
      selectedIds.delete(id);
      if (recognizedItems.length === 0) {
        cancelResults();
      } else {
        renderResults();
      }
    }

    function saveSingle(id) {
      const item = recognizedItems.find(it => it._id === id);
      if (!item) return;
      saveItems([item]);
      removeItem(id);
    }

    function saveSelected() {
      const toSave = recognizedItems.filter(it => selectedIds.has(it._id));
      if (toSave.length === 0) return;
      saveItems(toSave);
      toSave.forEach(it => removeItem(it._id));
    }

    function saveItems(items) {
      items.forEach(item => {        const newItem = {
          id: Date.now() + Math.random(),
          product_name: item.product_name || 'Неизвестно',
          brand: item.brand || 'No brand',
          category: item.category || '—',
          empty_weight: item._empty_weight,
          material_type: item.material_type || 'other',
          size: item.size || 'medium',
          recyclable: item.recyclable,
          timestamp: new Date().toLocaleString('ru-RU'),
          description: item.description
        };
        stats = {
          total: stats.total + 1,
          rec: item.recyclable ? stats.rec + 1 : stats.rec,
          w: stats.w + item._empty_weight
        };
        history = [newItem, ...history].slice(0, 50);
      });
      localStorage.setItem("recognizer_stats", JSON.stringify(stats));
      localStorage.setItem("recognizer_history", JSON.stringify(history));
      updateStats();
      renderHistory();
    }

    function cancelResults() {
      recognizedItems = [];
      selectedIds.clear();
      actionState = 'recognize';
      document.getElementById('resultsSection').style.display = 'none';
    }

    async function switchToNextModel() {
      if (!stream) { showError("Сначала включите камеру"); return; }
      document.getElementById('btnSwitch').disabled = true;
      document.getElementById('err').style.display = 'none';
      try {
        const modelsRes = await fetch('/api/models');
        const modelsData = await modelsRes.json();
        if (!modelsData.models || modelsData.models.length === 0) throw new Error("Не удалось получить список моделей");
        const currentIndex = modelsData.models.findIndex(m => m.id === currentModel);
        const nextIndex = (currentIndex + 1) % modelsData.models.length;
        const nextModel = modelsData.models[nextIndex].id;
        await doRecognize(nextModel);
      } catch (e) { showError(e.message); }
      finally { document.getElementById('btnSwitch').disabled = false; }
    }

    function renderHistory() {
      const list = document.getElementById('historyList');      document.getElementById('historyCount').textContent = history.length;
      document.getElementById('btnClear').disabled = history.length === 0;
      if (history.length === 0) {
        list.innerHTML = '<li style="text-align:center;color:var(--text-muted);padding:20px;font-size:14px">Пока пусто</li>';
        return;
      }
      list.innerHTML = history.map(item => `
        <li class="history-item">
          <div class="history-item-header" onclick="toggleExpand(${item.id})">
            <div>
              <div class="history-item-title">${item.product_name}</div>
              <div class="history-item-sub">${item.brand} · ${MATERIAL_LABELS[item.material_type] || item.material_type} · ${item.empty_weight} г</div>
            </div>
            <span class="history-item-arrow ${expandedId === item.id ? 'open' : ''}">▼</span>
          </div>
          <div class="history-item-details ${expandedId === item.id ? 'open' : ''}">
            <div class="detail-row"><span class="detail-label">Категория</span><span class="detail-value">${item.category}</span></div>
            <div class="detail-row"><span class="detail-label">Материал</span><span class="detail-value">${MATERIAL_LABELS[item.material_type] || item.material_type}</span></div>
            <div class="detail-row"><span class="detail-label">Размер</span><span class="detail-value">${SIZE_LABELS[item.size] || item.size}</span></div>
            <div class="detail-row"><span class="detail-label">Вес пустой тары</span><span class="detail-value">${item.empty_weight} г</span></div>
            <div class="weight-calc">Для переработки: <strong>${item.empty_weight} г</strong> (пустая тара)</div>
            ${item.description ? `<div class="detail-row" style="flex-direction:column;gap:4px"><span class="detail-label">Описание</span><span class="detail-value">${item.description}</span></div>` : ''}
            <div class="detail-row"><span class="detail-label">Время</span><span class="detail-value">${item.timestamp}</span></div>
          </div>
        </li>
      `).join('');
    }

    function toggleExpand(id) { expandedId = expandedId === id ? null : id; renderHistory(); }

    function clearHistory() {
      if (!confirm('Очистить всю историю и статистику?')) return;
      history = []; stats = { total: 0, rec: 0, w: 0 };
      localStorage.removeItem("recognizer_history");
      localStorage.removeItem("recognizer_stats");
      updateStats(); renderHistory();
    }

    function showError(msg) {
      const el = document.getElementById('err');
      el.textContent = msg;
      el.style.display = 'block';
    }

    loadFromStorage();
  </script>
</body>
</html>
